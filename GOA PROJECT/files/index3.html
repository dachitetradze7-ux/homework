<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body {
            background-color: #0b1120;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: sans-serif;
            text-align: center;
        }

    

    .about-header-text {
    font-size: 1.5rem;
    margin-bottom: 30px;
    max-width: 80%;
}

.photo-container {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(59, 130, 240, 0.6);
    border: 5px solid #3b82f6;
    margin-bottom: 30px;
}

.photo-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.3s ease;
    
}

.photo-container img:hover {
    transform: scale(1.2);
    transition: 0.3s ease;
}

.back-btn {
    display: inline-block;

    background-color:  greenyellow;
    color: #cbd5e1;
    text-decoration: none;
    border-radius: 50px;
    font-weight: bold;
    transition: 0.3s;
    justify-content: flex-end;
    text-align: end;
}

.back-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(59, 130, 240, 0.6);;
